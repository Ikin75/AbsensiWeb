<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Absensi</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f8fafc;
        padding: 20px;
      }
      .container {
        max-width: 960px;
        margin: auto;
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 26px;
        margin-bottom: 5px;
        color: #1e293b;
      }
      .subtitle {
        color: #64748b;
        margin-bottom: 20px;
      }
      .tab-nav {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .tab-btn {
        background: #e2e8f0;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: #334155;
        transition: 0.2s;
      }
      .tab-btn.active {
        background: #3b82f6;
        color: white;
      }
      .btn {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 15px;
      }
      .btn:hover {
        background: #2563eb;
      }
      .loading {
        text-align: center;
        padding: 30px;
        color: #64748b;
      }

      /* Tabel Riwayat */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
        font-size: 14px;
      }
      th {
        background: #f1f5f9;
        font-weight: 600;
      }

      /* Kartu Status Hari Ini */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .status-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        transition: 0.2s;
      }
      .status-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .status-card .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .badge.working {
        background: #dcfce7;
        color: #16a34a;
      }
      .badge.done {
        background: #fee2e2;
        color: #dc2626;
      }
      .badge.none {
        background: #f1f5f9;
        color: #64748b;
      }
      .card-name {
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 4px;
      }
      .card-id {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 10px;
      }
      .card-time {
        font-size: 14px;
        margin-bottom: 4px;
      }
      .card-time span {
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📋 Laporan Absensi</h1>
      <p class="subtitle">Data waktu WIB</p>

      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('riwayat')">
          📄 Riwayat
        </button>
        <button class="tab-btn" onclick="switchTab('today')">
          📌 Status Hari Ini
        </button>
      </div>

      <div id="tab-content">
        <div id="riwayat-tab">
          <button class="btn" onclick="downloadExcel()">
            📥 Download Riwayat (.xlsx)
          </button>
          <div id="riwayat-container" class="loading">Memuat data...</div>
        </div>
        <div id="today-tab" style="display: none">
          <button class="btn" onclick="downloadTodayExcel()">
            📥 Download Status Hari Ini (.xlsx)
          </button>
          <div id="today-container" class="loading">Memuat data...</div>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzLNvs-0vvSmTriwkWMT7x7NYxvxYs284sj6825VQqXmCgn3qnvpMenT7NBwikWzJnE/exec"; // Ganti

      // Data global
      window.allData = []; // Data asli dari server
      window.todaySummary = []; // Ringkasan hari ini

      // Format WIB (dd-MM-yyyy HH:mm:ss)
      function formatWIB(isoString) {
        if (!isoString) return "";
        const date = new Date(isoString);
        const options = {
          timeZone: "Asia/Jakarta",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        };
        const formatter = new Intl.DateTimeFormat("id-ID", options);
        const parts = formatter.formatToParts(date);
        const p = {};
        parts.forEach((x) => {
          if (x.type !== "literal") p[x.type] = x.value;
        });
        return `${p.day}-${p.month}-${p.year} ${p.hour}:${p.minute}:${p.second}`;
      }

      // Tanggal hari ini dalam format yyyy-MM-dd WIB
      function getTodayWIB() {
        const now = new Date();
        const wib = new Date(
          now.toLocaleString("en-US", { timeZone: "Asia/Jakarta" }),
        );
        const y = wib.getFullYear();
        const m = String(wib.getMonth() + 1).padStart(2, "0");
        const d = String(wib.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      // JSONP
      function fetchDataJSONP() {
        const script = document.createElement("script");
        script.src = SCRIPT_URL + "?action=getData&callback=handleAllData";
        script.onerror = () => {
          document.getElementById("riwayat-container").innerHTML =
            '<p style="color:red;">Gagal memuat data.</p>';
          document.getElementById("today-container").innerHTML =
            '<p style="color:red;">Gagal memuat data.</p>';
        };
        document.body.appendChild(script);
      }

      function handleAllData(data) {
        window.allData = data;
        buildRiwayat();
        buildTodaySummary();
      }

      // ===== RIWAYAT (TABEL) =====
      function buildRiwayat() {
        const container = document.getElementById("riwayat-container");
        if (!window.allData || window.allData.length === 0) {
          container.innerHTML = "<p>Tidak ada data absensi.</p>";
          return;
        }
        const formatted = window.allData.map((row) => ({
          ...row,
          Tanggal: formatWIB(row.Timestamp),
        }));
        let html = `<table><thead><tr>
            <th>Tanggal & Waktu</th><th>ID</th><th>Nama</th><th>Jenis</th><th>Lokasi</th>
        </tr></thead><tbody>`;
        formatted.forEach((r) => {
          html += `<tr><td>${r.Tanggal}</td><td>${r.ID}</td><td>${r.Nama}</td><td>${r.Jenis}</td><td>${r.Lokasi}</td></tr>`;
        });
        html += "</tbody></table>";
        container.innerHTML = html;
      }

      // ===== STATUS HARI INI (KARTU) =====
      function buildTodaySummary() {
        const container = document.getElementById("today-container");
        const today = getTodayWIB(); // yyyy-MM-dd
        // Filter data hari ini
        const todayData = window.allData.filter((row) => {
          const dateStr = formatWIB(row.Timestamp).split(" ")[0]; // dd-MM-yyyy -> kita perlu balik ke yyyy-MM-dd untuk compare
          // Konversi balik
          const [d, m, y] = dateStr.split("-");
          const rowDate = `${y}-${m}-${d}`;
          return rowDate === today;
        });

        // Kelompokkan per ID
        const map = {};
        todayData.forEach((r) => {
          const id = r.ID;
          if (!map[id]) {
            map[id] = {
              id: id,
              nama: r.Nama,
              masuk: null,
              pulang: null,
              lokasiMasuk: "",
              lokasiPulang: "",
            };
          }
          if (r.Jenis === "Masuk") {
            // ambil yang pertama kali (atau kita bisa ambil yang paling awal)
            if (
              !map[id].masuk ||
              new Date(r.Timestamp) < new Date(map[id].masuk.timestamp)
            ) {
              map[id].masuk = {
                waktu: formatWIB(r.Timestamp),
                timestamp: r.Timestamp,
                lokasi: r.Lokasi,
              };
            }
          } else if (r.Jenis === "Pulang") {
            if (
              !map[id].pulang ||
              new Date(r.Timestamp) > new Date(map[id].pulang.timestamp)
            ) {
              map[id].pulang = {
                waktu: formatWIB(r.Timestamp),
                timestamp: r.Timestamp,
                lokasi: r.Lokasi,
              };
            }
          }
        });

        const summaries = Object.values(map);
        window.todaySummary = summaries;

        if (summaries.length === 0) {
          container.innerHTML = "<p>Belum ada aktivitas absensi hari ini.</p>";
          return;
        }

        let html = '<div class="card-grid">';
        summaries.forEach((s) => {
          const status = s.pulang ? "done" : "working";
          const statusText = s.pulang ? "Sudah Pulang" : "Sedang Bekerja";
          const badgeClass = s.pulang ? "done" : "working";
          const masukTime = s.masuk ? s.masuk.waktu : "-";
          const masukLoc = s.masuk ? s.masuk.lokasi : "-";
          const pulangTime = s.pulang ? s.pulang.waktu : "-";
          const pulangLoc = s.pulang ? s.pulang.lokasi : "-";

          html += `
            <div class="status-card">
                <span class="badge ${badgeClass}">${statusText}</span>
                <div class="card-name">${s.nama}</div>
                <div class="card-id">ID: ${s.id}</div>
                <div class="card-time"><span>🟢 Masuk:</span> ${masukTime} (${masukLoc})</div>
                <div class="card-time"><span>🔴 Pulang:</span> ${pulangTime} ${s.pulang ? "(" + pulangLoc + ")" : ""}</div>
            </div>`;
        });
        html += "</div>";
        container.innerHTML = html;
      }

      // ===== DOWNLOAD EXCEL =====
      function downloadExcel() {
        if (!window.allData || window.allData.length === 0) {
          alert("Tidak ada data.");
          return;
        }
        const data = window.allData.map((r) => ({
          Tanggal: formatWIB(r.Timestamp),
          ID: r.ID,
          Nama: r.Nama,
          Jenis: r.Jenis,
          Lokasi: r.Lokasi,
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        ws["!cols"] = [
          { wch: 22 },
          { wch: 10 },
          { wch: 25 },
          { wch: 10 },
          { wch: 30 },
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Riwayat");
        XLSX.writeFile(
          wb,
          `riwayat_absensi_${new Date().toISOString().slice(0, 10)}.xlsx`,
        );
      }

      function downloadTodayExcel() {
        if (!window.todaySummary || window.todaySummary.length === 0) {
          alert("Tidak ada data hari ini.");
          return;
        }
        const data = window.todaySummary.map((s) => ({
          ID: s.id,
          Nama: s.nama,
          "Jam Masuk": s.masuk ? s.masuk.waktu : "-",
          "Lokasi Masuk": s.masuk ? s.masuk.lokasi : "-",
          "Jam Pulang": s.pulang ? s.pulang.waktu : "-",
          "Lokasi Pulang": s.pulang ? s.pulang.lokasi : "-",
          Status: s.pulang ? "Sudah Pulang" : "Sedang Bekerja",
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        ws["!cols"] = [
          { wch: 10 },
          { wch: 25 },
          { wch: 22 },
          { wch: 25 },
          { wch: 22 },
          { wch: 25 },
          { wch: 15 },
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Status Hari Ini");
        XLSX.writeFile(
          wb,
          `status_hari_ini_${new Date().toISOString().slice(0, 10)}.xlsx`,
        );
      }

      // ===== TAB SWITCH =====
      function switchTab(tabName) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById("riwayat-tab").style.display = "none";
        document.getElementById("today-tab").style.display = "none";
        if (tabName === "riwayat") {
          document
            .querySelector(".tab-btn:first-child")
            .classList.add("active");
          document.getElementById("riwayat-tab").style.display = "block";
        } else {
          document.querySelector(".tab-btn:last-child").classList.add("active");
          document.getElementById("today-tab").style.display = "block";
        }
      }

      // ===== MULAI =====
      fetchDataJSONP();
    </script>
  </body>
</html>
