<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Absensi</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f8fafc;
        padding: 20px;
      }
      .container {
        max-width: 960px;
        margin: auto;
        background: white;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 26px;
        margin-bottom: 5px;
        color: #1e293b;
      }
      .subtitle {
        color: #64748b;
        margin-bottom: 20px;
      }
      .tab-nav {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .tab-btn {
        background: #e2e8f0;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: #334155;
        transition: 0.2s;
      }
      .tab-btn.active {
        background: #3b82f6;
        color: white;
      }
      .btn {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        margin-bottom: 15px;
      }
      .btn:hover {
        background: #2563eb;
      }
      .loading {
        text-align: center;
        padding: 30px;
        color: #64748b;
      }

      /* Tabel Riwayat */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #e2e8f0;
        font-size: 14px;
      }
      th {
        background: #f1f5f9;
        font-weight: 600;
      }

      /* Kartu Status Terkini */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .status-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        transition: 0.2s;
      }
      .status-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .badge.working {
        background: #dcfce7;
        color: #16a34a;
      }
      .badge.done {
        background: #fee2e2;
        color: #dc2626;
      }
      .badge.none {
        background: #f1f5f9;
        color: #64748b;
      }
      .card-name {
        font-size: 16px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 4px;
      }
      .card-id {
        font-size: 13px;
        color: #64748b;
        margin-bottom: 10px;
      }
      .card-time {
        font-size: 14px;
        margin-bottom: 4px;
      }
      .card-time span {
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📋 Laporan Absensi</h1>
      <p class="subtitle">Data waktu WIB</p>

      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('riwayat')">
          📄 Riwayat
        </button>
        <button class="tab-btn" onclick="switchTab('today')">
          📌 Status Terkini
        </button>
      </div>

      <div id="tab-content">
        <div id="riwayat-tab">
          <button class="btn" onclick="downloadExcel()">
            📥 Download Riwayat (.xlsx)
          </button>
          <div id="riwayat-container" class="loading">Memuat data...</div>
        </div>
        <div id="today-tab" style="display: none">
          <button class="btn" onclick="downloadStatusExcel()">
            📥 Download Status Terkini (.xlsx)
          </button>
          <div id="today-container" class="loading">Memuat data...</div>
        </div>
      </div>
    </div>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzLNvs-0vvSmTriwkWMT7x7NYxvxYs284sj6825VQqXmCgn3qnvpMenT7NBwikWzJnE/exec"; // Ganti

      window.allData = [];
      window.statusSummary = []; // untuk kartu status terkini

      // Format WIB (dd-MM-yyyy HH:mm:ss)
      function formatWIB(isoString) {
        if (!isoString) return "";
        const date = new Date(isoString);
        const options = {
          timeZone: "Asia/Jakarta",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        };
        const formatter = new Intl.DateTimeFormat("id-ID", options);
        const parts = formatter.formatToParts(date);
        const p = {};
        parts.forEach((x) => {
          if (x.type !== "literal") p[x.type] = x.value;
        });
        return `${p.day}-${p.month}-${p.year} ${p.hour}:${p.minute}:${p.second}`;
      }

      // Ambil semua data via JSONP
      function fetchDataJSONP() {
        const script = document.createElement("script");
        script.src = SCRIPT_URL + "?action=getData&callback=handleAllData";
        script.onerror = () => {
          document.getElementById("riwayat-container").innerHTML =
            '<p style="color:red;">Gagal memuat data.</p>';
          document.getElementById("today-container").innerHTML =
            '<p style="color:red;">Gagal memuat data.</p>';
        };
        document.body.appendChild(script);
      }

      function handleAllData(data) {
        window.allData = data;
        buildRiwayat();
        buildStatusSummary();
      }

      // ===== RIWAYAT (TABEL) =====
      function buildRiwayat() {
        const container = document.getElementById("riwayat-container");
        if (!window.allData || window.allData.length === 0) {
          container.innerHTML = "<p>Tidak ada data absensi.</p>";
          return;
        }
        const formatted = window.allData.map((row) => ({
          ...row,
          Tanggal: formatWIB(row.Timestamp),
        }));
        let html = `<table><thead><tr>
            <th>Tanggal & Waktu</th><th>ID</th><th>Nama</th><th>Jenis</th><th>Lokasi</th>
        </tr></thead><tbody>`;
        formatted.forEach((r) => {
          html += `<tr><td>${r.Tanggal}</td><td>${r.ID}</td><td>${r.Nama}</td><td>${r.Jenis}</td><td>${r.Lokasi}</td></tr>`;
        });
        html += "</tbody></table>";
        container.innerHTML = html;
      }

      // ===== STATUS TERKINI (berdasarkan pasangan Masuk-Pulang terakhir) =====
      function buildStatusSummary() {
        const container = document.getElementById("today-container");
        const data = window.allData;
        if (!data || data.length === 0) {
          container.innerHTML = "<p>Tidak ada data.</p>";
          return;
        }

        // Urutkan seluruh data per ID berdasarkan Timestamp (paling awal ke akhir)
        const grouped = {};
        data.forEach((row) => {
          const id = row.ID;
          if (!grouped[id]) {
            grouped[id] = { id: id, nama: row.Nama, records: [] };
          }
          grouped[id].records.push({
            jenis: row.Jenis,
            timestamp: new Date(row.Timestamp), // objek Date asli
            lokasi: row.Lokasi,
          });
        });

        // Untuk setiap karyawan, cari Masuk terakhir dan Pulang setelahnya
        const summaries = [];
        for (let [id, group] of Object.entries(grouped)) {
          const records = group.records;
          // Urutkan kronologis (seharusnya sudah, tapi jaga-jaga)
          records.sort((a, b) => a.timestamp - b.timestamp);

          let lastMasuk = null;
          let lastPulang = null;
          // Cari Masuk terakhir dan Pulang terakhir
          for (let r of records) {
            if (r.jenis === "Masuk") {
              lastMasuk = r;
            } else if (r.jenis === "Pulang") {
              lastPulang = r;
            }
          }

          let status = "none";
          let jamMasuk = "-";
          let lokasiMasuk = "-";
          let jamPulang = "-";
          let lokasiPulang = "-";

          if (lastMasuk && lastPulang) {
            // Ada keduanya. Jika Pulang terjadi setelah Masuk terakhir -> sudah pulang.
            if (lastPulang.timestamp > lastMasuk.timestamp) {
              status = "done";
              jamMasuk = formatWIB(lastMasuk.timestamp);
              lokasiMasuk = lastMasuk.lokasi;
              jamPulang = formatWIB(lastPulang.timestamp);
              lokasiPulang = lastPulang.lokasi;
            } else {
              // Pulang terakhir lebih awal dari Masuk terakhir (jarang, tapi jaga-jaga)
              status = "working";
              jamMasuk = formatWIB(lastMasuk.timestamp);
              lokasiMasuk = lastMasuk.lokasi;
            }
          } else if (lastMasuk && !lastPulang) {
            // Hanya ada Masuk
            status = "working";
            jamMasuk = formatWIB(lastMasuk.timestamp);
            lokasiMasuk = lastMasuk.lokasi;
          } else if (!lastMasuk && lastPulang) {
            // Hanya ada Pulang (mungkin data historis yang kehapus masukannya)
            status = "done";
            jamPulang = formatWIB(lastPulang.timestamp);
            lokasiPulang = lastPulang.lokasi;
          } else {
            status = "none";
          }

          summaries.push({
            id: group.id,
            nama: group.nama,
            status: status,
            masuk: status === "working" || status === "done" ? jamMasuk : null,
            lokasiMasuk: lokasiMasuk,
            pulang: status === "done" ? jamPulang : null,
            lokasiPulang: lokasiPulang,
          });
        }

        window.statusSummary = summaries;

        if (summaries.length === 0) {
          container.innerHTML = "<p>Tidak ada data karyawan.</p>";
          return;
        }

        let html = '<div class="card-grid">';
        summaries.forEach((s) => {
          let badgeClass = "none",
            badgeText = "Belum ada data";
          if (s.status === "working") {
            badgeClass = "working";
            badgeText = "Sedang Bekerja";
          } else if (s.status === "done") {
            badgeClass = "done";
            badgeText = "Sudah Pulang";
          }

          html += `
            <div class="status-card">
                <span class="badge ${badgeClass}">${badgeText}</span>
                <div class="card-name">${s.nama}</div>
                <div class="card-id">ID: ${s.id}</div>
                <div class="card-time"><span>🟢 Masuk:</span> ${s.masuk || "-"} ${s.masuk ? "(" + s.lokasiMasuk + ")" : ""}</div>
                <div class="card-time"><span>🔴 Pulang:</span> ${s.pulang || "-"} ${s.pulang ? "(" + s.lokasiPulang + ")" : ""}</div>
            </div>`;
        });
        html += "</div>";
        container.innerHTML = html;
      }

      // ===== DOWNLOAD EXCEL =====
      function downloadExcel() {
        if (!window.allData || window.allData.length === 0) {
          alert("Tidak ada data.");
          return;
        }
        const data = window.allData.map((r) => ({
          Tanggal: formatWIB(r.Timestamp),
          ID: r.ID,
          Nama: r.Nama,
          Jenis: r.Jenis,
          Lokasi: r.Lokasi,
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        ws["!cols"] = [
          { wch: 22 },
          { wch: 10 },
          { wch: 25 },
          { wch: 10 },
          { wch: 30 },
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Riwayat");
        XLSX.writeFile(
          wb,
          `riwayat_absensi_${new Date().toISOString().slice(0, 10)}.xlsx`,
        );
      }

      function downloadStatusExcel() {
        if (!window.statusSummary || window.statusSummary.length === 0) {
          alert("Tidak ada data status.");
          return;
        }
        const data = window.statusSummary.map((s) => ({
          ID: s.id,
          Nama: s.nama,
          Status:
            s.status === "working"
              ? "Sedang Bekerja"
              : s.status === "done"
                ? "Sudah Pulang"
                : "Belum ada data",
          "Jam Masuk": s.masuk || "-",
          "Lokasi Masuk": s.lokasiMasuk || "-",
          "Jam Pulang": s.pulang || "-",
          "Lokasi Pulang": s.lokasiPulang || "-",
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        ws["!cols"] = [
          { wch: 10 },
          { wch: 25 },
          { wch: 15 },
          { wch: 22 },
          { wch: 25 },
          { wch: 22 },
          { wch: 25 },
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Status Terkini");
        XLSX.writeFile(
          wb,
          `status_terkini_${new Date().toISOString().slice(0, 10)}.xlsx`,
        );
      }

      // ===== TAB SWITCH =====
      function switchTab(tabName) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById("riwayat-tab").style.display = "none";
        document.getElementById("today-tab").style.display = "none";
        if (tabName === "riwayat") {
          document
            .querySelector(".tab-btn:first-child")
            .classList.add("active");
          document.getElementById("riwayat-tab").style.display = "block";
        } else {
          document.querySelector(".tab-btn:last-child").classList.add("active");
          document.getElementById("today-tab").style.display = "block";
        }
      }

      fetchDataJSONP();
    </script>
  </body>
</html>
