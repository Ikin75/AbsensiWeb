<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absensi Digital</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Roboto, sans-serif;
        background: #f0f4f8;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        flex-direction: column;
      }
      .card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .logo-container {
        margin-bottom: 5px;
      }
      .logo-container img {
        max-width: 150px;
        height: auto;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 5px;
        color: #1e293b;
      }
      .subtitle {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 25px;
      }
      .status-box {
        background: #f1f5f9;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
      }
      .status-text {
        font-weight: 600;
        font-size: 18px;
        color: #0f172a;
      }
      .status-detail {
        font-size: 13px;
        color: #475569;
        margin-top: 5px;
      }
      .input-group {
        margin-bottom: 20px;
        text-align: left;
      }
      .input-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        font-size: 14px;
        color: #334155;
      }
      .input-group input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font-size: 16px;
        transition: 0.2s;
      }
      .input-group input:focus {
        border-color: #3b82f6;
        outline: none;
      }
      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        color: white;
        background: #3b82f6;
        cursor: pointer;
        transition: 0.2s;
        margin-bottom: 10px;
      }
      .btn:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }
      .btn-out {
        background: #ef4444;
      }
      .btn-out:disabled {
        background: #fca5a5;
      }
      .message {
        margin-top: 15px;
        font-size: 14px;
        font-weight: 500;
      }
      .error {
        color: #dc2626;
      }
      .success {
        color: #16a34a;
      }
      .info {
        color: #2563eb;
      }
      .id-info {
        font-size: 13px;
        color: #475569;
        margin-top: 5px;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #64748b;
      }

      /* Modal Pop-up */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-box {
        background: white;
        border-radius: 16px;
        padding: 30px 20px;
        max-width: 320px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .modal-box h2 {
        font-size: 20px;
        margin-bottom: 10px;
        color: #1e293b;
      }
      .modal-box p {
        font-size: 15px;
        color: #475569;
        margin-bottom: 20px;
      }
      .modal-box button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .modal-box button.red {
        background: #ef4444;
      }
      .modal-box button.gray {
        background: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo-container">
        <img src="logo.png" alt="Logo Perusahaan" />
      </div>
      <h1>🏢 Absensi Digital</h1>
      <div class="subtitle">Absen hanya bisa dilakukan di area kantor</div>

      <div class="status-box">
        <div class="status-text" id="statusLokasi">Mencari lokasi...</div>
        <div class="status-detail" id="detailLokasi">
          Mohon izinkan akses GPS
        </div>
      </div>

      <div class="input-group">
        <label for="idKaryawan">ID Karyawan</label>
        <input
          type="text"
          id="idKaryawan"
          placeholder="Masukkan ID Anda"
          autocomplete="off"
        />
        <div class="id-info" id="idInfo"></div>
      </div>

      <div class="input-group" id="namaGroup" style="display: none">
        <label for="nama">Nama Karyawan</label>
        <input type="text" id="nama" placeholder="Nama Anda" readonly />
      </div>

      <button class="btn" id="btnMasuk" disabled onclick="absen('Masuk')">
        ✅ Absen Masuk
      </button>
      <button
        class="btn btn-out"
        id="btnPulang"
        disabled
        onclick="absen('Pulang')"
      >
        🚪 Absen Pulang
      </button>

      <div class="message" id="message"></div>
      <div class="footer">Created by SANTARA</div>
    </div>

    <!-- Pop-up Modal -->
    <div class="modal-overlay" id="popupModal">
      <div class="modal-box">
        <h2 id="popupTitle">Informasi</h2>
        <p id="popupMessage"></p>
        <button id="popupButton" onclick="closePopup()">OK</button>
      </div>
    </div>

    <script>
      // ===== KONFIGURASI =====
      const OFFICE_LOCATIONS = [
        {
          nama: "BAT Singosari (utama)",
          lat: -7.891745,
          lng: 112.664147,
          radius: 100,
        },
        {
          nama: "BAT Singosari (area 2)",
          lat: -7.872989,
          lng: 112.6861417,
          radius: 150,
        },
        { nama: "BAT Karanglo", lat: -7.916256, lng: 112.6533, radius: 100 },
      ];

      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbzLNvs-0vvSmTriwkWMT7x7NYxvxYs284sj6825VQqXmCgn3qnvpMenT7NBwikWzJnE/exec";

      const DEFAULT_KARYAWAN = [
        { id: "MK001", nama: "dr. Hasniah Harun, MKK" },
        { id: "MK002", nama: "dr. Beta Wahyudi" },
        { id: "MK003", nama: "Caroline Didin Fitrikasari" },
        { id: "MK004", nama: "Arifka Novi Pratiwi" },
        { id: "MK005", nama: "Raidah Islami Zafir" },
        { id: "MK006", nama: "Anastacia Evi Dwi Rusmiati" },
        { id: "MK007", nama: "Ana" },
        { id: "MK008", nama: "Faqih" },
        { id: "MK009", nama: "Asvien" },
        { id: "MK010", nama: "Winda" },
      ];

      // ===== STATE =====
      let currentPos = null;
      let isInside = false;
      let currentLocationName = null;
      let currentKaryawan = null;
      let watchId = null;
      let today = new Date().toLocaleDateString("id-ID");

      const idInput = document.getElementById("idKaryawan");
      const idInfo = document.getElementById("idInfo");
      const namaGroup = document.getElementById("namaGroup");
      const namaInput = document.getElementById("nama");
      const btnMasuk = document.getElementById("btnMasuk");
      const btnPulang = document.getElementById("btnPulang");
      const statusLokasi = document.getElementById("statusLokasi");
      const detailLokasi = document.getElementById("detailLokasi");
      const messageEl = document.getElementById("message");

      // ===== POPUP =====
      const popupModal = document.getElementById("popupModal");
      const popupTitle = document.getElementById("popupTitle");
      const popupMessage = document.getElementById("popupMessage");
      const popupButton = document.getElementById("popupButton");

      function showPopup(title, message, buttonText = "OK", callback = null) {
        popupTitle.textContent = title;
        popupMessage.textContent = message;
        popupButton.textContent = buttonText;
        popupButton.className = "";
        if (callback) {
          popupButton.onclick = () => {
            closePopup();
            callback();
          };
        } else {
          popupButton.onclick = closePopup;
        }
        popupModal.classList.add("active");
      }

      function closePopup() {
        popupModal.classList.remove("active");
      }

      // ===== LOCAL STORAGE =====
      function getDaftarKaryawan() {
        const data = localStorage.getItem("daftar_karyawan");
        return data ? JSON.parse(data) : DEFAULT_KARYAWAN;
      }
      function simpanDaftarKaryawan(daftar) {
        localStorage.setItem("daftar_karyawan", JSON.stringify(daftar));
      }
      if (!localStorage.getItem("daftar_karyawan")) {
        simpanDaftarKaryawan(DEFAULT_KARYAWAN);
      }

      function saveAttendanceState(id, state) {
        try {
          localStorage.setItem(`absensi_${id}`, JSON.stringify(state));
        } catch (e) {}
      }
      function getAttendanceState(id) {
        const data = localStorage.getItem(`absensi_${id}`);
        return data ? JSON.parse(data) : null;
      }

      // ===== GEOLOCATION =====
      function haversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const toRad = (deg) => (deg * Math.PI) / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }
      function cekLokasiTerdekat(lat, lng) {
        for (let lokasi of OFFICE_LOCATIONS) {
          const jarak = haversineDistance(lat, lng, lokasi.lat, lokasi.lng);
          if (jarak <= lokasi.radius)
            return { nama: lokasi.nama, jarak, inside: true };
        }
        let minJarak = Infinity;
        for (let lokasi of OFFICE_LOCATIONS) {
          const jarak = haversineDistance(lat, lng, lokasi.lat, lokasi.lng);
          if (jarak < minJarak) minJarak = jarak;
        }
        return { nama: null, jarak: minJarak, inside: false };
      }
      function updateLocation(pos) {
        currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        const hasil = cekLokasiTerdekat(currentPos.lat, currentPos.lng);
        isInside = hasil.inside;
        currentLocationName = hasil.nama;
        if (isInside) {
          statusLokasi.textContent = `📍 Anda di dalam area ${hasil.nama}`;
          statusLokasi.style.color = "#16a34a";
          detailLokasi.textContent = `Jarak: ${Math.round(hasil.jarak)} meter`;
        } else {
          statusLokasi.textContent = "🚫 Anda di luar area kantor";
          statusLokasi.style.color = "#dc2626";
          detailLokasi.textContent = `Jarak ke lokasi terdekat: ${Math.round(hasil.jarak)} meter`;
          currentLocationName = null;
        }
        updateButtons();
      }
      function locationError(err) {
        statusLokasi.textContent = "⚠️ Gagal mendapat lokasi";
        statusLokasi.style.color = "#dc2626";
        detailLokasi.textContent = err.message || "Periksa izin GPS";
        isInside = false;
        currentLocationName = null;
        updateButtons();
      }
      function startWatch() {
        if ("geolocation" in navigator) {
          watchId = navigator.geolocation.watchPosition(
            updateLocation,
            locationError,
            {
              enableHighAccuracy: true,
              maximumAge: 5000,
              timeout: 10000,
            },
          );
        } else {
          statusLokasi.textContent = "❌ Browser tidak mendukung GPS";
          statusLokasi.style.color = "#dc2626";
        }
      }

      // ===== SINKRONISASI STATUS DARI SERVER =====
      function syncStatusFromServer(id) {
        showPopup("Memeriksa Status", "Mohon tunggu sebentar...", "OK");
        checkStatusFromServer(id, "handleSyncStatus");
      }

      function checkStatusFromServer(id, callback) {
        const script = document.createElement("script");
        script.src =
          SCRIPT_URL + "?action=checkStatus&id=" + id + "&callback=" + callback;
        script.onerror = () => {
          // Gagal kontak server, fallback localStorage
          closePopup();
          showMessage(
            "⚠️ Tidak dapat menghubungi server. Menggunakan data lokal.",
            "error",
          );
          updateButtonsFromLocal();
        };
        document.body.appendChild(script);
        script.onload = () => document.body.removeChild(script);
      }

      function handleSyncStatus(response) {
        closePopup(); // tutup popup "memeriksa"
        if (!response || typeof response.status === "undefined") {
          showMessage("Gagal memuat status, coba lagi.", "error");
          updateButtonsFromLocal();
          return;
        }
        const id = currentKaryawan ? currentKaryawan.id : null;
        if (!id) return;

        const serverStatus = response.status; // 'masuk', 'pulang', 'belum'
        // Simpan ke localStorage biar sinkron
        if (serverStatus === "masuk" || serverStatus === "pulang") {
          saveAttendanceState(id, { status: serverStatus, date: today });
        } else {
          saveAttendanceState(id, null);
        }
        updateButtons();

        // Tampilkan pop-up status
        if (currentKaryawan) {
          const nama = currentKaryawan.nama;
          if (serverStatus === "masuk") {
            showPopup(
              "Status Absensi",
              `Anda (${nama}) sudah absen masuk hari ini. Silakan klik Absen Pulang jika sudah selesai bekerja.`,
              "Mengerti",
            );
          } else if (serverStatus === "pulang") {
            showPopup(
              "Status Absensi",
              `Anda (${nama}) sudah menyelesaikan absensi hari ini.`,
              "OK",
            );
          } else {
            // Belum absen
            showPopup(
              "Status Absensi",
              `Anda (${nama}) belum absen. Silakan klik Absen Masuk.`,
              "OK",
            );
          }
        }
      }

      function updateButtonsFromLocal() {
        updateButtons();
      }

      // ===== LOGIKA ID INPUT =====
      idInput.addEventListener("input", function () {
        const id = this.value.trim();
        const daftar = getDaftarKaryawan();
        const karyawan = daftar.find((k) => k.id === id);
        if (karyawan) {
          idInfo.textContent = `✅ Nama: ${karyawan.nama}`;
          idInfo.style.color = "#16a34a";
          namaInput.value = karyawan.nama;
          namaGroup.style.display = "block";
          currentKaryawan = karyawan;
          // Sinkronisasi status dari server sambil pop-up
          syncStatusFromServer(id);
        } else {
          idInfo.textContent = "ID tidak ditemukan";
          idInfo.style.color = "#dc2626";
          namaGroup.style.display = "none";
          currentKaryawan = null;
          updateButtons();
        }
      });

      // ===== UPDATE TOMBOL =====
      function updateButtons() {
        if (!currentKaryawan) {
          btnMasuk.disabled = true;
          btnPulang.disabled = true;
          return;
        }
        if (!isInside) {
          btnMasuk.disabled = true;
          btnPulang.disabled = true;
          return;
        }

        const id = currentKaryawan.id;
        const state = getAttendanceState(id);
        const isToday = state && state.date === today;
        const status = isToday ? state.status : null;

        if (!status || status === "pulang") {
          btnMasuk.disabled = false;
          btnPulang.disabled = true;
        } else if (status === "masuk") {
          btnMasuk.disabled = true;
          btnPulang.disabled = false;
        } else {
          btnMasuk.disabled = true;
          btnPulang.disabled = true;
        }
      }

      // ===== ABSENSI =====
      function absen(jenis) {
        if (!currentKaryawan) {
          showMessage("Masukkan ID", "error");
          return;
        }
        if (!currentPos) {
          showMessage("Lokasi belum tersedia", "error");
          return;
        }
        const id = currentKaryawan.id;
        const nama = currentKaryawan.nama;
        // Validasi server dulu
        window._pendingAbsen = { jenis, id, nama };
        checkStatusFromServer(id, "handleAbsenValidation");
      }

      function handleAbsenValidation(response) {
        if (!window._pendingAbsen) return;
        const { jenis, id, nama } = window._pendingAbsen;
        window._pendingAbsen = null;
        if (!response || typeof response.status === "undefined") {
          showPopup(
            "Error",
            "Gagal memvalidasi status. Silakan coba lagi.",
            "OK",
          );
          return;
        }
        const serverStatus = response.status;

        if (jenis === "Masuk" && serverStatus === "masuk") {
          showPopup(
            "Info",
            `Anda (${nama}) sudah melakukan absen masuk hari ini. Silakan klik Absen Pulang.`,
            "OK",
          );
          saveAttendanceState(id, { status: "masuk", date: today });
          updateButtons();
          return;
        }
        if (jenis === "Pulang" && serverStatus === "pulang") {
          showPopup(
            "Info",
            `Anda (${nama}) sudah melakukan absen pulang hari ini.`,
            "OK",
          );
          saveAttendanceState(id, { status: "pulang", date: today });
          updateButtons();
          return;
        }
        if (jenis === "Pulang" && serverStatus !== "masuk") {
          showPopup(
            "Gagal",
            "Anda belum absen masuk, tidak bisa pulang.",
            "OK",
          );
          return;
        }

        // Lolos, kirim data
        kirimAbsen(jenis, id, nama);
      }

      async function kirimAbsen(jenis, id, nama) {
        try {
          showMessage("Mengirim data...", "info");
          await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: new URLSearchParams({
              id: id,
              nama: nama,
              jenis: jenis,
              lat: currentPos.lat,
              lng: currentPos.lng,
              lokasi: currentLocationName || "Tidak diketahui",
            }),
          });
          saveAttendanceState(id, { status: jenis.toLowerCase(), date: today });
          if (jenis === "Masuk") {
            showPopup(
              "Absen Berhasil",
              `Selamat bekerja, ${nama}! Semoga lancar dan berkah hari ini.`,
              "OK",
            );
          } else {
            showPopup(
              "Absen Berhasil",
              "Hati-hati di jalan, sehat selalu.",
              "OK",
            );
          }
          updateButtons();
        } catch (e) {
          showPopup("Gagal", "Gagal mengirim data. Silakan coba lagi.", "OK");
        }
      }

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = "message " + (type || "info");
        setTimeout(() => {
          messageEl.textContent = "";
        }, 5000);
      }

      // ===== INISIALISASI =====
      startWatch();
      updateButtons();
    </script>
  </body>
</html>
